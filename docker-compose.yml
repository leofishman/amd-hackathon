services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: drupal
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      # Track 3: OpenAI-compatible endpoint for AMD GPU inference.
      # Preferred for "AMD Instinct GPU" with cost 0 in decisions log.
      # On minisforum (after killing external vLLM/llama.cpp):
      #   AMD_VLLM_URL=http://172.17.0.1:11435/v1
      # or http://host.docker.internal:11435/v1
      # The compose ollama service now runs ollama/ollama:rocm on port 11435.
      AMD_VLLM_URL: ${AMD_VLLM_URL:-}
      # Optional: web evidence fallback (Tavily) and verbatim plagiarism
      # search (Serper.dev) for the Content scan.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      # Optional: relay factcheck admin-alert emails to Telegram (this box
      # has no working outbound mail). See amd_hackathon.module.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Admin password for site install (default "admin" for local dev;
      # ALWAYS set a strong one for a public demo).
      ADMIN_PASS: ${ADMIN_PASS:-admin}
      OLLAMA_URL: http://ollama:11434
      # Comma-separated models to pull at first boot. Swap for the models
      # revealed at the kickoff.
      OLLAMA_MODELS: ${OLLAMA_MODELS:-gemma3:4b}
      # Local model (entity id) that judges answers before they are
      # returned; rejection escalates to the best route candidate. Empty =
      # disabled. Editable later on the route form.
      AGENT_VERIFIER_MODEL: ${AGENT_VERIFIER_MODEL:-}
    volumes:
      # Named volume seeded from the image on first run; persists
      # settings.php and public files across container recreation.
      - drupal_sites:/opt/drupal/web/sites
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  db:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    # ROCm-enabled Ollama for AMD GPUs (Minisforum Ryzen AI, AMD Instinct,
    # etc). Requires /dev/kfd + /dev/dri on the host — this hackathon is
    # about AMD GPU inference, so that's a requirement, not an option.
    # On minisforum: first kill external vLLM / llama.cpp processes that are
    # holding memory, then docker compose up -d. This service will use the GPU.
    image: ollama/ollama:rocm
    restart: unless-stopped
    ports:
      # Expose on host port 11435 so AMD_VLLM_URL=http://172.17.0.1:11435/v1 works
      # from inside the web container and for external tools.
      - "11435:11434"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    ipc: host
    shm_size: 16gb
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # For Ryzen AI 9 HX 370 + 890M iGPU (ROCm support is partial/experimental)
      - OLLAMA_IGPU_ENABLE=1          # required, otherwise it drops the iGPU
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_CONTEXT_LENGTH=8192    # keep modest to reduce CPU from cache mgmt + re-processing on iGPU
      # Do NOT set HSA_OVERRIDE_GFX_VERSION inside the container unless testing —
      # it can force CPU fallback on this APU. Let the rocm image auto-detect.
    # Cap CPU cores so the host doesn't get pegged by llama-server threads
    # (GPU still does the heavy lifting, VRAM stays low).
    deploy:
      resources:
        limits:
          cpus: '6'

volumes:
  db_data:
  ollama_data:
  drupal_sites:
